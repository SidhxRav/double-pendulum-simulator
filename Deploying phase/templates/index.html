<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Pendulum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="sidebar">
        <label for="planet">Planet</label>
        <select id="planet">
            <option value="9.8">Earth</option>
            <option value="1.62">Moon</option>
            <option value="3.72">Mars</option>
        </select>
        <label for="m1">Mass 1 (kg)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
        <label for="m2">Mass 2 (kg)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
        <label for="r1">Length 1 (m)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
        <label for="r2">Length 2 (m)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
        <label for="theta1">Angle 1 (°)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
        <label for="theta2">Angle 2 (°)</label>
        <input type="number" id="m1" value="1" min="0.1" step="0.1">
    </div>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/pendulum.js') }}"></script>
</body>
</html>
